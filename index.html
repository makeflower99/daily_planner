<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 데일리 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('checklist')">✅ 체크리스트</button>
  <button class="nav-btn" onclick="showPage('calendar')">📅 캘린더</button>
  <button class="nav-btn" onclick="showPage('tracker')">📊 일일 기록</button>
  <span class="nav-user" id="nav-username"></span>
</nav>

<div class="storage-warning" id="storage-warning" style="display:none">
  데이터 저장에 문제가 있습니다. 데이터 내보내기를 권장합니다.
</div>

<!-- ===== 체크리스트 페이지 ===== -->
<div class="page active" id="page-checklist">
  <div class="header">
    <div class="checklist-date-nav">
      <button class="cal-nav" onclick="changeChecklistDate(-1)">‹</button>
      <div class="header-date" id="today-date" onclick="toggleMiniCal()"></div>
      <button class="cal-nav" onclick="changeChecklistDate(1)">›</button>
    </div>
    <div class="mini-cal" id="mini-cal" style="display:none">
      <div class="mini-cal-header">
        <button class="mini-cal-nav" onclick="changeMiniCalMonth(-1)">‹</button>
        <span id="mini-cal-month"></span>
        <button class="mini-cal-nav" onclick="changeMiniCalMonth(1)">›</button>
      </div>
      <div class="mini-cal-grid" id="mini-cal-grid"></div>
    </div>
    <div class="header-title" id="checklist-title">오늘의 루틴</div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>진행률</span>
        <span id="prog-text">0 / 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="stat-done" style="color:var(--accent)">0</div><div class="stat-label">완료</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-remain" style="color:var(--accent3)">0</div><div class="stat-label">남은 항목</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-pct" style="color:var(--accent2)">0%</div><div class="stat-label">달성률</div></div>
  </div>

  <div class="checklist-memo-section">
    <div class="checklist-memo-header">
      <span class="checklist-memo-title">📝 메모</span>
      <span class="checklist-memo-saved" id="checklist-memo-saved">저장됨 ✓</span>
    </div>
    <textarea id="checklist-memo-input" class="checklist-memo-input" placeholder="오늘의 메모를 작성하세요..." rows="3"></textarea>
  </div>

  <div class="checklist-todo-section">
    <div class="checklist-memo-header">
      <span class="checklist-memo-title">☑️ 할 일</span>
      <span class="checklist-memo-saved" id="checklist-todo-saved">저장됨 ✓</span>
    </div>
    <div class="todo-input-row">
      <input type="text" id="checklist-todo-input" class="todo-text-input" placeholder="할 일을 입력하세요...">
      <button class="todo-add-btn" onclick="addChecklistTodo()">추가</button>
    </div>
    <div id="checklist-todo-list"></div>
  </div>

  <div id="sections-container"></div>
</div>

<!-- ===== 캘린더 페이지 ===== -->
<div class="page" id="page-calendar">
  <div class="cal-header">
    <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
    <div class="cal-month" id="cal-month-label"></div>
    <button class="cal-nav" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>

  <!-- 전체 섹션 목록 -->
  <div class="recurring-all-panel">
    <div class="section-header">
      <span class="section-title">📋 등록된 루틴</span>
    </div>
    <div id="all-sections-list"></div>
  </div>

  <div id="cal-detail-panel" style="display:none">
    <div class="memo-panel">
      <div class="memo-panel-title" id="cal-detail-title"></div>

      <!-- 날짜별 루틴 체크리스트 -->
      <div id="cal-sections-container" style="margin-bottom:12px"></div>

      <!-- 식단 계획 -->
      <div class="meal-panel">
        <div class="meal-panel-title">🍽️ 식단 계획</div>
        <div id="meal-plan-container"></div>
      </div>

      <!-- 몸무게 -->
      <div class="weight-section">
        <div class="meal-section-title" style="font-weight:700;color:var(--text2);margin-bottom:6px">⚖️ 오늘의 몸무게</div>
        <div class="weight-input-row">
          <input type="number" step="0.1" min="0" max="300" id="weight-input" placeholder="0.0" class="weight-input">
          <span class="weight-unit">kg</span>
          <button class="memo-save" onclick="saveWeightValue()">저장</button>
          <span class="memo-saved" id="weight-saved-msg">저장됐어요!</span>
        </div>
        <div class="weight-diff-row" id="weight-diff-row" style="display:none">
          <span id="weight-target-display"></span>
          <span id="weight-diff-display"></span>
        </div>
      </div>

      <!-- 메모 -->
      <div style="margin-top: 14px;">
        <div class="meal-section-title" style="font-weight:700;color:var(--text2);margin-bottom:6px">📝 메모</div>
        <textarea class="memo-textarea" id="memo-input" placeholder="오늘의 메모..." style="min-height:60px"></textarea>
        <div style="display:flex;align-items:center">
          <button class="memo-save" onclick="saveMemo()">저장</button>
          <span class="memo-saved" id="memo-saved-msg">저장됐어요!</span>
        </div>
      </div>

      <!-- 할 일 -->
      <div style="margin-top: 14px;">
        <div class="meal-section-title" style="font-weight:700;color:var(--text2);margin-bottom:6px">☑️ 할 일</div>
        <div class="todo-input-row">
          <input type="text" id="cal-todo-input" class="todo-text-input" placeholder="할 일을 입력하세요...">
          <button class="todo-add-btn" onclick="addCalTodo()">추가</button>
        </div>
        <div id="cal-todo-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 일일 기록 페이지 ===== -->
<div class="page" id="page-tracker">
  <div class="tracker-date-nav">
    <button class="cal-nav" onclick="changeTrackerDate(-1)">‹</button>
    <div class="tracker-date-label" id="tracker-date-label"></div>
    <button class="cal-nav" onclick="changeTrackerDate(1)">›</button>
  </div>
  <div id="tracker-content"></div>

  <!-- 설정 영역 -->
  <div class="settings-section">
    <div class="settings-title">⚙️ 설정</div>
    <div class="settings-item">
      <label class="settings-label">🎯 목표 몸무게</label>
      <div class="weight-input-row">
        <input type="number" step="0.1" min="0" max="300" id="target-weight-input" placeholder="0.0" class="weight-input" value="">
        <span class="weight-unit">kg</span>
        <button class="memo-save" onclick="saveTargetWeight()">저장</button>
        <span class="memo-saved" id="target-weight-saved-msg">저장됐어요!</span>
      </div>
    </div>
    <button class="theme-toggle-btn" id="theme-toggle-btn" onclick="toggleTheme()">🌙 어두운 테마</button>
    <div class="data-mgmt">
      <button class="data-btn" onclick="exportToJSON()">📥 데이터 내보내기</button>
      <button class="data-btn" onclick="document.getElementById('import-file').click()">📤 데이터 가져오기</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
    </div>
    <button class="theme-toggle-btn" style="margin-top:8px;background:var(--danger);" onclick="logout()">🚪 로그아웃</button>
  </div>
</div>

<!-- ===== 항목 추가/수정 모달 ===== -->
<div class="modal-bg" id="item-modal">
  <div class="modal">
    <h3 id="modal-title">항목 추가</h3>
    <select id="modal-section"></select>
    <input type="text" id="modal-emoji" placeholder="이모지 (예: 🌿)" maxlength="2" style="width:80px;margin-right:8px;display:inline-block">
    <input type="text" id="modal-label" placeholder="항목 이름" style="width:calc(100% - 96px);display:inline-block">
    <div class="date-range-row">
      <div class="date-field">
        <label>시작일</label>
        <input type="date" id="modal-item-start-date">
      </div>
      <div class="date-field">
        <div style="display:flex;align-items:center;gap:6px">
          <label>종료일</label>
          <label class="endless-label"><input type="checkbox" id="modal-item-endless" checked onchange="toggleEndless('modal-item')"> 무기한</label>
        </div>
        <input type="date" id="modal-item-end-date" disabled>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-primary" onclick="saveItem()">저장</button>
      <button class="btn-secondary" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<!-- ===== 섹션 추가 모달 ===== -->
<div class="modal-bg" id="section-modal">
  <div class="modal">
    <h3>새 섹션 추가</h3>
    <input type="text" id="section-name" placeholder="섹션 이름 (예: 운동, 영양제 등)">
    <div style="margin-top:4px;margin-bottom:6px;font-size:11px;color:var(--text3)">색상</div>
    <div class="color-picker-row" id="section-color-options"></div>
    <div style="margin-top:4px;margin-bottom:6px;font-size:11px;color:var(--text3)">반복 주기</div>
    <div class="repeat-options" id="section-repeat-options"></div>
    <div class="repeat-extra" id="section-repeat-extra" style="display:none"></div>
    <div class="date-range-row">
      <div class="date-field">
        <label>시작일</label>
        <input type="date" id="section-start-date">
      </div>
      <div class="date-field">
        <div style="display:flex;align-items:center;gap:6px">
          <label>종료일</label>
          <label class="endless-label"><input type="checkbox" id="section-endless" checked onchange="toggleEndless('section')"> 무기한</label>
        </div>
        <input type="date" id="section-end-date" disabled>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-primary" onclick="saveSection()">저장</button>
      <button class="btn-secondary" onclick="closeSectionModal()">취소</button>
    </div>
  </div>
</div>

<!-- ===== 섹션 편집 모달 ===== -->
<div class="modal-bg" id="section-edit-modal">
  <div class="modal">
    <h3>섹션 편집</h3>
    <input type="text" id="section-edit-name" placeholder="섹션 이름">
    <div style="margin-top:4px;margin-bottom:6px;font-size:11px;color:var(--text3)">색상</div>
    <div class="color-picker-row" id="section-edit-color-options"></div>
    <div style="margin-top:4px;margin-bottom:6px;font-size:11px;color:var(--text3)">반복 주기</div>
    <div class="repeat-options" id="section-edit-repeat-options"></div>
    <div class="repeat-extra" id="section-edit-repeat-extra" style="display:none"></div>
    <div class="date-range-row">
      <div class="date-field">
        <label>시작일</label>
        <input type="date" id="section-edit-start-date">
      </div>
      <div class="date-field">
        <div style="display:flex;align-items:center;gap:6px">
          <label>종료일</label>
          <label class="endless-label"><input type="checkbox" id="section-edit-endless" checked onchange="toggleEndless('section-edit')"> 무기한</label>
        </div>
        <input type="date" id="section-edit-end-date" disabled>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-primary" onclick="saveEditSection()">저장</button>
      <button class="btn-secondary" onclick="closeEditSectionModal()">취소</button>
    </div>
  </div>
</div>

<!-- ===== 적용 범위 선택 모달 ===== -->
<div class="modal-bg" id="scope-modal">
  <div class="modal">
    <h3 id="scope-modal-title">적용 범위</h3>
    <p id="scope-modal-desc" style="font-size:13px;color:var(--text2);margin-bottom:14px"></p>
    <div class="scope-btns">
      <button class="scope-btn scope-btn-danger" onclick="scopeResolve('all')">
        <span class="scope-btn-title" style="color:var(--danger)">완전히 삭제</span>
        <span class="scope-btn-desc">모든 기록을 삭제합니다</span>
      </button>
      <button class="scope-btn" onclick="scopeResolve('future')">
        <span class="scope-btn-title">습관 종료</span>
        <span class="scope-btn-desc">오늘까지 기록 유지, 내일부터 종료</span>
      </button>
      <button class="scope-btn cancel" onclick="scopeResolve(null)">취소</button>
    </div>
  </div>
</div>

<!-- JS 모듈 로드 순서: data → checklist → calendar → tracker -->
<script src="js/data.js"></script>
<script src="js/checklist.js"></script>
<script src="js/calendar.js"></script>
<script src="js/tracker.js"></script>
<script>
// ===== 테마 초기화 =====
(function() {
  const saved = localStorage.getItem('planner_theme') || 'dark';
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  updateThemeButton(saved);
})();

function toggleTheme() {
  const current = localStorage.getItem('planner_theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  if (next === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  localStorage.setItem('planner_theme', next);
  updateThemeButton(next);
}

function updateThemeButton(theme) {
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️ 밝은 테마로 변경' : '🌙 어두운 테마로 변경';
}

// ===== 목표 몸무게 관리 =====
function saveTargetWeight() {
  const val = document.getElementById('target-weight-input').value;
  saveTargetWeightData(val);
  const msg = document.getElementById('target-weight-saved-msg');
  msg.classList.add('show');
  setTimeout(() => msg.classList.remove('show'), 1500);
}

function loadTargetWeightInput() {
  const input = document.getElementById('target-weight-input');
  if (input) input.value = getTargetWeight() || '';
}

// ===== 초기화 =====
loadData().then(() => {
  initChecklist();
  initCalendar();
  initTracker();
  loadTargetWeightInput();
});

// 페이지 닫기 전 자동 저장 (sendBeacon으로 확실히 전송)
window.addEventListener('beforeunload', () => {
  const json = JSON.stringify(data);
  navigator.sendBeacon('/api/data', new Blob([json], { type: 'application/json' }));
});

// 로그아웃
function logout() {
  fetch('/api/auth/logout', { method: 'POST' }).finally(() => {
    window.location.href = '/login.html';
  });
}

// 페이지 전환
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'calendar') renderCalendar();
  if (name === 'tracker') renderTracker();
}

// 모달 배경 클릭으로 닫기
document.getElementById('item-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.getElementById('section-modal').addEventListener('click', function(e) { if (e.target === this) closeSectionModal(); });
document.getElementById('section-edit-modal').addEventListener('click', function(e) { if (e.target === this) closeEditSectionModal(); });
document.getElementById('scope-modal').addEventListener('click', function(e) { if (e.target === this) scopeResolve(null); });

// 모달 Enter 키 저장
document.getElementById('modal-label').addEventListener('keydown', e => { if (e.key === 'Enter') saveItem(); });
document.getElementById('section-name').addEventListener('keydown', e => { if (e.key === 'Enter') saveSection(); });
document.getElementById('section-edit-name').addEventListener('keydown', e => { if (e.key === 'Enter') saveEditSection(); });

// 데이터 가져오기
function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  importFromJSON(file).then(() => {
    renderChecklist();
    renderCalendar();
    renderTracker();
    alert('데이터를 성공적으로 가져왔습니다!');
  }).catch(err => {
    alert(err.message);
  });
  event.target.value = '';
}
</script>
</body>
</html>
