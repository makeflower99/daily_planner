<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 데일리 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<script>
  // 테마 적용
  (function() {
    const saved = localStorage.getItem('planner_theme') || 'dark';
    if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  })();
</script>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-title">데일리 플래너</div>
    <div class="login-subtitle">로그인하여 시작하세요</div>
    <form id="login-form">
      <input class="login-input" id="login-username" type="text" placeholder="아이디" autocomplete="username" required>
      <input class="login-input" id="login-password" type="password" placeholder="비밀번호" autocomplete="current-password" required>
      <button class="login-btn" type="submit" id="login-btn">로그인</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errorEl = document.getElementById('login-error');
  errorEl.textContent = '';
  btn.disabled = true;

  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      errorEl.textContent = data.error || '로그인에 실패했습니다';
    }
  } catch {
    errorEl.textContent = '서버에 연결할 수 없습니다';
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
