<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 데일리 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  .login-wrap {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .login-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 380px;
    text-align: center;
  }
  .login-title {
    font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--text);
  }
  .login-subtitle {
    font-size: 14px; color: var(--text2); margin-bottom: 32px;
  }
  .login-input {
    width: 100%; padding: 12px 16px; margin-bottom: 12px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 15px; font-family: inherit; outline: none;
    transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-input::placeholder { color: var(--text3); }
  .login-btn {
    width: 100%; padding: 13px; margin-top: 8px;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.85; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error {
    color: var(--danger); font-size: 13px; margin-top: 12px;
    min-height: 20px;
  }
</style>
</head>
<body>
<script>
  // 테마 적용
  (function() {
    const saved = localStorage.getItem('planner_theme') || 'dark';
    if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  })();
</script>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-title">데일리 플래너</div>
    <div class="login-subtitle">로그인하여 시작하세요</div>
    <form id="login-form">
      <input class="login-input" id="login-username" type="text" placeholder="아이디" autocomplete="username" required>
      <input class="login-input" id="login-password" type="password" placeholder="비밀번호" autocomplete="current-password" required>
      <button class="login-btn" type="submit" id="login-btn">로그인</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errorEl = document.getElementById('login-error');
  errorEl.textContent = '';
  btn.disabled = true;

  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      errorEl.textContent = data.error || '로그인에 실패했습니다';
    }
  } catch {
    errorEl.textContent = '서버에 연결할 수 없습니다';
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
